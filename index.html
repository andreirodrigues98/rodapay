<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#04070D" />
  <title>RODAPAY</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="RodaPay" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="img/rodapay-icon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="img/rodapay-icon-180.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <div id="confirmModal" class="modal hidden" aria-hidden="true">
    <div class="modal-card compact confirm-card">
      <button class="icon-btn modal-close" data-close-confirm aria-label="Fechar">×</button>
      <div class="confirm-badge">!</div>
      <h3 id="confirmTitle">Excluir este item?</h3>
      <p id="confirmText">Essa ação não poderá ser desfeita.</p>
      <div class="confirm-actions">
        <button type="button" class="btn ghost" data-close-confirm id="confirmCancel">Cancelar</button>
        <button type="button" id="confirmAction" class="btn danger">Excluir</button>
      </div>
    </div>
  </div>

  <section id="loginView" class="login-view">
    <div class="login-card">
      <div class="brand-block">
        <div class="brand-logo"><img src="img/rodapay-logo.png" alt="RODAPAY"></div>
        <h1>RODAPAY</h1>
        <p>Controle financeiro, metas e produtividade para motoristas.</p>
      </div>
      <form id="loginForm" class="form-stack">
        <label>E-mail<input id="loginEmail" type="email" autocomplete="email" required placeholder="seuemail@exemplo.com" /></label>
        <label>Senha<input id="loginPassword" type="password" autocomplete="current-password" required placeholder="Sua senha" /></label>
        <button class="btn primary" type="submit">Entrar</button><p class="login-help">Entre com o e-mail e a senha do seu acesso.</p>
      </form>
    </div>
  </section>

  <main id="appShell" class="app-shell hidden">
    <header class="app-header">
      <div class="brand-line"><div class="mini-logo"><img src="img/rodapay-logo.png" alt="RODAPAY"></div><strong>RODAPAY</strong></div>
      <button id="headerLogout" class="small-link">Sair</button>
    </header>

    <section id="dashboardView" class="screen active-screen">
      <nav class="period-tabs" aria-label="Período do painel">
        <button class="period-tab active" data-period="daily">Diário</button>
        <button class="period-tab" data-period="weekly">Semanal</button>
        <button class="period-tab" data-period="monthly">Mensal</button>
        <button class="period-tab" data-period="yearly">Anual</button>
      </nav>
      <div id="dashboardContent"></div>
    </section>

    <section id="transactionsView" class="screen">
      <div class="screen-title-row">
        <h2>Transações</h2>
        <button id="transactionFilterBtn" class="chip">Filtrar por: Todos</button>
      </div>
      <nav class="sub-tabs">
        <button class="sub-tab active" data-transaction-tab="entries">Entradas</button>
        <button class="sub-tab" data-transaction-tab="expenses">Saídas</button>
      </nav>
      <div id="transactionsList" class="list-stack"></div>
    </section>

    <section id="settingsView" class="screen">
      <h2>Configurações</h2>
      <div id="settingsMenu" class="settings-menu"></div>
      <div id="settingsPanel" class="settings-panel hidden"></div>
    </section>

    <section id="drivingView" class="screen driving-screen">
      <button class="back-btn" data-back-dashboard>← Voltar</button>
      <div class="brand-block small"><div class="brand-logo"><img src="img/rodapay-logo.png" alt="RODAPAY"></div><h1>Jornada</h1></div>
      <button id="driveStartPause" class="drive-circle">INICIAR</button>
      <div id="driveTimer" class="drive-timer">00:00:00</div>
      <p class="muted-center">Tempo decorrido de trabalho</p>
      <button id="driveFinish" class="btn danger hidden">ENCERRAR JORNADA</button>
    </section>

    <button id="floatingAdd" class="fab add-fab" aria-label="Adicionar"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
    <button id="floatingDrive" class="fab drive-fab" aria-label="Driving"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M6.3 9.5A2 2 0 0 1 8.2 8h7.6a2 2 0 0 1 1.9 1.5l1 3.5c.1.2.1.4.1.6V17a1 1 0 0 1-1 1h-.8a2 2 0 0 1-4 0H11a2 2 0 0 1-4 0h-.8a1 1 0 0 1-1-1v-3.4c0-.2 0-.4.1-.6l1-3.5Z" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/><path d="M7.2 13.2h9.6" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/><path d="M7.6 16.2h.01M16.4 16.2h.01" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg></button>

    <nav class="bottom-nav" aria-label="Navegação principal">
      <button class="nav-item active" data-view="dashboardView"><span><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span>Painel</button>
      <button class="nav-item" data-view="transactionsView"><span><svg viewBox="0 0 24 24"><path d="M7 7h13l-3-3"/><path d="M17 17H4l3 3"/><path d="M20 7l-3 3"/><path d="M4 17l3-3"/></svg></span>Transações</button>
      <button class="nav-item" data-view="settingsView"><span><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.4-2.4 1a7 7 0 0 0-1.7-1L14.5 3h-5l-.3 3.1a7 7 0 0 0-1.7 1l-2.4-1-2 3.4 2 1.5a7 7 0 0 0 0 2l-2 1.5 2 3.4 2.4-1a7 7 0 0 0 1.7 1l.3 3.1h5l.3-3.1a7 7 0 0 0 1.7-1l2.4 1 2-3.4-2-1.5c.1-.3.1-.6.1-1Z"/></svg></span>Configurações</button>
    </nav>
  </main>

  <div id="formModal" class="modal hidden" aria-hidden="true">
    <div class="modal-card large">
      <button class="icon-btn modal-close" data-close-form aria-label="Fechar">×</button>
      <div id="formModalContent"></div>
    </div>
  </div>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="utils.js"></script>
  <script type="module" src="data.js"></script>
  <script type="module" src="auth.js"></script>
  <script type="module" src="dashboard.js"></script>
  <script type="module" src="transactions.js"></script>
  <script type="module" src="settings.js"></script>
  <script type="module" src="goals.js"></script>
  <script type="module" src="driving.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
